<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVlonly</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * {
            will-change: transform;
        }
    </style>
</head>

<body
    class="bg-gradient-to-b from-white via-[#f1f5f9] to-[#bae6fd] min-h-screen flex items-center justify-center text-black">

    <!-- EFFECT BACKGROUND BAWAH -->
    <div class="absolute bottom-0 left-0 w-full h-40 bg-gradient-to-t from-[#cfefff] to-transparent"></div>
    <div class="absolute bottom-0 left-0 w-full h-52 bg-gradient-to-t from-[#7dd3fc]/50 to-transparent blur-2xl"></div>
    <!-- CARD -->
    <div
        class="relative bg-[#eef6fb]/80 backdrop-blur-md shadow-xl rounded-2xl p-8 w-96 text-center space-y-6 border border-gray-200">

        <!-- Logo -->
        <div class="flex justify-center">
            <div
                class="w-28 h-28 rounded-full border-4 border-[#38bdf8] flex items-center justify-center shadow-[0_0_15px_#38bdf8]">
                <img src="rem.jpeg" alt="logo" class="rounded-full">
            </div>
        </div>

        <!-- Title -->
        <div class="flex justify-center">
            <img src="R.png" alt="REVlonly Logo" class="h-12 object-contain drop-shadow">
        </div>

        <!-- Subtitle -->
        <p class="text-gray-500 text-sm leading-relaxed">
            Welcome to Gabut Impact <br>
            Main game biar gak stress,<br>
            bukan stress gegara main game :)
        </p>

        <!-- Buttons -->
        <div class="space-y-4 w-80 mx-auto">

            <a href="https://wa.me/6283191158298?text=Halooo%20saya%20mau%20order%20joki%20Min" class="block w-full py-3 rounded-full text-center
      border border-[#38bdf8] text-black bg-white
      transition-all duration-300 ease-out
      hover:bg-[#38bdf8] hover:text-black hover:scale-[1.03]
      active:scale-95">
                Order Joki
            </a>

           <a href="pricelist.html"
class="w-full py-3 rounded-full
border border-[#38bdf8] text-black bg-white
transition-all duration-300 hover:bg-[#38bdf8] hover:text-black text-center block">
  Price List Joki
</a>

            <a href="https://www.tiktok.com/@kocheng_212?_r=1&_t=ZS-9542EhKgaxh" class="block w-full py-3 rounded-full text-center
      border border-[#38bdf8] text-black bg-white
      transition-all duration-300 ease-out
      hover:bg-[#38bdf8] hover:text-black hover:scale-[1.03]
      active:scale-95">
                TikTok
            </a>

            <a href="https://www.instagram.com/khocengwibu?igsh=ZjI5NTRhd3Fqcnhi" class="block w-full py-3 rounded-full text-center
      border border-[#38bdf8] text-black bg-white
      transition-all duration-300 ease-out
      hover:bg-[#38bdf8] hover:text-black hover:scale-[1.03]
      active:scale-95">
                Instagram
            </a>

        </div>

    </div>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">

        <div id="modalBox" class="bg-white rounded-2xl p-6 w-80 text-center relative
    opacity-0 translate-y-10 transition-all duration-300 shadow-xl">

            <button onclick="closeModal()" class="absolute top-2 right-3 text-black text-xl">&times;</button>

            <div id="sliderContent" class="space-y-3 transition-all duration-300"></div>

            <div class="flex justify-between mt-4">
                <button onclick="prevSlide()"
                    class="px-3 py-1 border border-black rounded hover:scale-110 transition">⬅</button>
                <button onclick="nextSlide()"
                    class="px-3 py-1 border border-black rounded hover:scale-110 transition">➡</button>
            </div>

        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        const slides = [
            {
                title: "Joki Explore",
                content: "- Open Map<br>- Chest Farming<br>- Resource Collect"
            },
            {
                title: "Joki All Quest",
                content: "- Archon Quest<br>- Story Quest<br>- World Quest"
            },
            {
                title: "Joki Daily",
                content: "- Commission<br>- Resin Burn<br>- Domain Farming"
            }
        ];

        let current = 0;

        function openModal() {
            const modal = document.getElementById("modal");
            const box = document.getElementById("modalBox");

            modal.classList.remove("hidden");

            setTimeout(() => {
                box.classList.remove("opacity-0", "translate-y-10");
                box.classList.add("opacity-100", "translate-y-0");
            }, 10);

            updateSlide();
        }

        function closeModal() {
            const modal = document.getElementById("modal");
            const box = document.getElementById("modalBox");

            box.classList.add("opacity-0", "translate-y-10");
            box.classList.remove("opacity-100", "translate-y-0");

            setTimeout(() => {
                modal.classList.add("hidden");
            }, 300);
        }

        function updateSlide() {
            const container = document.getElementById("sliderContent");

            container.classList.add("opacity-0", "translate-x-5");

            setTimeout(() => {
                const slide = slides[current];
                container.innerHTML = `
          <h2 class="text-xl font-bold text-[#38bdf8]">${slide.title}</h2>
          <p class="text-sm text-gray-600">${slide.content}</p>
        `;

                container.classList.remove("translate-x-5");
                container.classList.add("translate-x-0", "opacity-100");
            }, 150);
        }

        function nextSlide() {
            current = (current + 1) % slides.length;
            updateSlide();
        }

        function prevSlide() {
            current = (current - 1 + slides.length) % slides.length;
            updateSlide();
        }
    </script>

</body>

</html>
