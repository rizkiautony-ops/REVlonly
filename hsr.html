<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Web - REVlonly</title>

    <link rel="icon" type="image/png" href="logo a.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }
    </style>
</head>

<body
    class="bg-gradient-to-b from-white via-[#f1f5f9] to-[#bae6fd] min-h-screen flex items-center justify-center text-black overflow-x-hidden p-6">

    <div
        class="absolute bottom-0 left-0 w-full h-52 pointer-events-none bg-gradient-to-t from-[#7dd3fc]/60 to-transparent blur-2xl">
    </div>

    <div
        class="relative bg-white/80 backdrop-blur-md shadow-2xl rounded-[2.5rem] p-8 w-full max-w-[400px] text-center space-y-8 border border-white/50">

        <div class="flex justify-center pt-4">
            <img src="logo.png" alt="REVlonly Logo"
                class="h-10 w-auto object-contain drop-shadow-sm pointer-events-none" draggable="false">
        </div>

        <div class="py-10 space-y-4">
            <div class="inline-block px-4 py-1 rounded-full bg-sky-50 border border-sky-100">
                <p class="text-sky-500 font-bold text-[10px] tracking-widest uppercase animate-pulse-slow">Under
                    Development</p>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">Coming Soon</h1>
            <p class="text-gray-500 text-sm leading-relaxed px-6 font-medium">
                Sabar ya bro! Layanan untuk game ini sedang kami siapkan supaya hasilnya maksimal.
            </p>
        </div>

        <div class="space-y-3 w-full">
            <a href="index.html"
                class="block w-full py-3.5 rounded-full text-center border border-sky-400/50 text-sky-500 bg-transparent transition-all duration-300 ease-out hover:bg-sky-400 hover:text-white hover:scale-[1.03] active:scale-95 shadow-sm font-bold">
                Kembali ke Menu Utama
            </a>

            <a href="https://wa.me/6283191158298"
                class="block w-full py-3.5 rounded-full text-center border border-slate-200 text-slate-400 bg-transparent transition-all duration-300 font-bold text-sm">
                Hubungi Admin
            </a>
        </div>

        <p class="text-[10px] text-gray-400 uppercase tracking-[0.3em] pt-4 font-bold">© REVlonly 2026</p>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'i' || (e.shiftKey && e.key === 'I'))) {
                e.preventDefault();
            }
        });
    </script>

</body>

</html>
