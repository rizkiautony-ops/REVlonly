    <div class="relative bg-[#eef6fb]/80 backdrop-blur-md shadow-xl rounded-2xl p-8 w-[90%] max-w-96 text-center space-y-6 border border-white/50">

        </div>

        <div class="space-y-1">

        </div>

        <div class="space-y-3 w-full mx-auto">

            </a>

             <a href="pricelist.html" class="w-full py-3 rounded-full
border border-[#38bdf8] text-black bg-white
transition-all duration-300 hover:bg-[#38bdf8] hover:text-black text-center block">
                Price List Joki
            </a>

            <a href="https://www.tiktok.com/@kocheng_212?_r=1&_t=ZS-9542EhKgaxh" 
               class="block w-full py-3 rounded-full text-center border border-[#38bdf8] text-black bg-white transition-all duration-300 ease-out hover:bg-[#38bdf8] hover:scale-[1.03] active:scale-95 shadow-sm">
                TikTok
            </a>

            <a href="https://www.instagram.com/mch_r_a_a?igsh=cGM4jlmbWJ0YjQ4" 
               class="block w-full py-3 rounded-full text-center border border-[#38bdf8] text-black bg-white transition-all duration-300 ease-out hover:bg-[#38bdf8] hover:scale-[1.03] active:scale-95 shadofile:///E:/web%20REVlonly/index.htmlw-sm">

            </a>

            <a href="index.html".html" 
               class="block w-full py-3 rounded-full text-center border border-[#38bdf8] text-black bg-white transition-all duration-300 ease-out hover:bg-[#38bdf8] hover:scale-[1.03] active:scale-95 shadow-sm">
                Official Web
            </a>

        </div>

        <p class="text-[10px] text-gray-400 uppercase tracking-widest pt-2">© REVlonly 2026</p>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 backdrop-blur-sm p-4">
        <div id="modalBox" class="bg-white rounded-3xl p-8 w-full max-w-sm text-center relative opacity-0 translate-y-10 transition-all duration-300 shadow-2xl">
            
            <button onclick="closeModal()" class="absolute top-4 right-5 text-gray-400 hover:text-black text-2xl font-bold">&times;</button>

            <div id="sliderContent" class="min-h-[120px] flex flex-col justify-center space-y-4 transition-all duration-300">
                </div>

            <div class="flex justify-between items-center mt-8">
                <button onclick="prevSlide()" class="w-10 h-10 flex items-center justify-center border border-gray-200 rounded-full hover:bg-gray-100 transition active:scale-90 text-lg">←</button>
                <div class="flex space-x-1" id="dots"></div>
                <button onclick="nextSlide()" class="w-10 h-10 flex items-center justify-center border border-gray-200 rounded-full hover:bg-gray-100 transition active:scale-90 text-lg">→</button>
            </div>
        </div>
    </div>

    <script>
        const slides = [
            {
                title: "Joki Explore",
                content: "• Open Map (Full Unlock)<br>• Chest Farming (All Rarity)<br>• Oculi / Resource Collect"
            },
            {
                title: "Joki All Quest",
                content: "• Archon Quest (Main Story)<br>• Story Quest (Character)<br>• World Quest (Hidden Quest)"
            },
            {
                title: "Joki Daily",
                content: "• Daily Commission<br>• Resin Burn (Farm Artifact)<br>• Event Limited Time"
            }
        ];

        let current = 0;

        function openModal() {
            const modal = document.getElementById("modal");
            const box = document.getElementById("modalBox");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            setTimeout(() => {
                box.classList.remove("opacity-0", "translate-y-10");
                box.classList.add("opacity-100", "translate-y-0");
            }, 10);
            updateSlide();
        }

        function closeModal() {
            const modal = document.getElementById("modal");
            const box = document.getElementById("modalBox");
            box.classList.add("opacity-0", "translate-y-10");
            box.classList.remove("opacity-100", "translate-y-0");
            setTimeout(() => {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }, 300);
        }

        function updateSlide() {
            const container = document.getElementById("sliderContent");
            container.style.opacity = "0";
            container.style.transform = "translateX(-10px)";

            setTimeout(() => {
                const slide = slides[current];
                container.innerHTML = `
                    <h2 class="text-2xl font-bold text-[#38bdf8]">${slide.title}</h2>
                    <div class="text-gray-600 text-sm leading-relaxed">${slide.content}</div>
                `;
                container.style.opacity = "1";
                container.style.transform = "translateX(0)";
            }, 200);
        }

        function nextSlide() {
            current = (current + 1) % slides.length;
            updateSlide();
        }

        function prevSlide() {
            current = (current - 1 + slides.length) % slides.length;
            updateSlide();
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'i')) {
                e.preventDefault();
            }
        });

        window.onclick = function(event) {
            const modal = document.getElementById("modal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
